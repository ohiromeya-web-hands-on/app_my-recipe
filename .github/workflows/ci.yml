name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: dummy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: "ci-secret"
          AUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "ci-client-id"
          GOOGLE_CLIENT_SECRET: "ci-client-secret"
          OWNER_GOOGLE_EMAILS: "owner@example.com,backup-owner@example.com"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          CRON_SECRET: "ci-cron-secret"
          BLOB_READ_WRITE_TOKEN: "ci-blob-token"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright axe smoke
        run: npm run test:e2e
        env:
          AUTH_SECRET: "ci-secret"
          AUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "ci-client-id"
          GOOGLE_CLIENT_SECRET: "ci-client-secret"
          OWNER_GOOGLE_EMAILS: "owner@example.com,backup-owner@example.com"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          CRON_SECRET: "ci-cron-secret"
          BLOB_READ_WRITE_TOKEN: "ci-blob-token"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          E2E_OWNER_EMAIL: "owner@example.com"
          PLAYWRIGHT_TEST: "1"

      - name: Playwright unauthenticated owner guard
        run: npm run test:e2e:guard:unauth
        env:
          AUTH_SECRET: "ci-secret"
          AUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "ci-client-id"
          GOOGLE_CLIENT_SECRET: "ci-client-secret"
          OWNER_GOOGLE_EMAILS: "owner@example.com,backup-owner@example.com"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          CRON_SECRET: "ci-cron-secret"
          BLOB_READ_WRITE_TOKEN: "ci-blob-token"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          PLAYWRIGHT_TEST: "1"

      - name: Playwright non-owner guard
        run: npm run test:e2e:guard:non-owner
        env:
          AUTH_SECRET: "ci-secret"
          AUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "ci-client-id"
          GOOGLE_CLIENT_SECRET: "ci-client-secret"
          OWNER_GOOGLE_EMAILS: "owner@example.com,backup-owner@example.com"
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          CRON_SECRET: "ci-cron-secret"
          BLOB_READ_WRITE_TOKEN: "ci-blob-token"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          PLAYWRIGHT_TEST: "1"
